name: flask app hola

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Construir imagen de docker
        run: docker build -t ghcr.io/isaacyav97/holaflask:1.0.0 .

      - name: Login hacia GitHub Container Registry
        run: echo "${{ secrets.TOKEN_WR }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publicar la imagen
        run: docker push ghcr.io/isaacyav97/holaflask:1.0.0